name: Deploy Backend to Azure

on:
  push:
    branches: [ main ]
    paths:
      - 'Backend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore Backend/RealtimeChat.Api/RealtimeChat.Api/RealtimeChat.Api.csproj

      - name: Build
        run: dotnet build Backend/RealtimeChat.Api/RealtimeChat.Api/RealtimeChat.Api.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish Backend/RealtimeChat.Api/RealtimeChat.Api/RealtimeChat.Api.csproj --configuration Release --output ./publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_API_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: ./publish